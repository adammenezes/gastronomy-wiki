# ============================================================
#  Cooking Brain — Source Registry
#  Add new sources here. No code changes required if the
#  crawler type already exists.
# ============================================================

sources:
  # ── Free web sources ─────────────────────────────────────
  - name: theculinarypro
    display: "The Culinary Pro"
    url: https://www.theculinarypro.com/
    type: web_article
    crawler: WebCrawler
    access: free

  - name: gastronomica
    display: "Gastronomica: The Journal of Critical Food Studies"
    url: https://gastronomica.org/
    type: journal_article
    crawler: MultiLinkCrawler
    access: free
    container_patterns:
      - "volume"
      - "number"

  - name: aacc_libguide
    display: "AACC Culinary Arts Library Guide"
    url: https://libguides.aacc.edu/culinaryarts
    type: web_article
    crawler: WebCrawler
    access: free

  # ── Academic journals (paywalled — metadata + abstract only) ─
  - name: intl_journal_gastronomy_food_science
    display: "International Journal of Gastronomy and Food Science (Tandfonline)"
    url: https://www.tandfonline.com/journals/wcsc20
    type: journal
    crawler: JournalScraper
    access: paywalled

  - name: intl_journal_food_science_tech
    display: "International Journal of Food Science & Technology (Tandfonline)"
    url: https://www.tandfonline.com/journals/rffc20
    type: journal
    crawler: JournalScraper
    access: paywalled

  - name: food_research_international
    display: "Food Research International (ScienceDirect)"
    url: https://www.sciencedirect.com/journal/food-research-international
    type: journal
    crawler: JournalScraper
    access: paywalled

  # ── Free web sources (additional) ────────────────────────────
  - name: serious_eats
    display: "Serious Eats"
    url: https://www.seriouseats.com/
    type: web_article
    crawler: WebCrawler
    access: free

  - name: the_food_lab
    display: "Serious Eats — The Food Lab"
    url: https://www.seriouseats.com/the-food-lab
    type: web_article
    crawler: WebCrawler
    access: free

  - name: modernist_cuisine_blog
    display: "Modernist Cuisine Blog"
    url: https://modernistcuisine.com/blog/
    type: web_article
    crawler: WebCrawler
    access: free

  # ── Dynamic search discovery (all results require manual verification) ─
  - name: web_search
    display: "Web Search (Brave)"
    url: ""                           # not used — search builds its own URLs
    type: search_result
    crawler: SearchCrawler
    access: verify                    # ALWAYS verify — never auto-ingest

    # Brave API auth
    api_key_env: BRAVE_API_KEY

    # Query construction
    search_suffix: "culinary food science cooking"
    queries_per_gap: 1               # queries per gap term (future: >1 for high-signal gaps)
    max_gaps: 25                     # search the top 25 gap terms

    # Result volume — Brave API hard max is 20
    max_results: 10

    # Freshness filter (Brave API param) — keeps results current
    # Values: pd (24h) | pw (7d) | pm (31d) | py (1yr) | YYYY-MM-DDtoYYYY-MM-DD
    freshness: py

    # Language — restricts results server-side before they reach our filter
    search_lang: en

    # Domains to skip (merged with built-in list in search_crawler.py)
    skip_domains:
      - allrecipes.com               # recipe cards only, no food science depth
      - foodnetwork.com              # entertainment-focused, low research value
      - tasteofhome.com
      - epicurious.com
      - delish.com
      - buzzfeed.com
      - thekitchn.com                # lifestyle-heavy
      - bonappetit.com               # magazine paywalls, low yield on free tier

    # Domains that indicate high-quality culinary/food-science content
    # These surface as metadata in leads so the scorer can boost them
    preferred_domains:
      - seriouseats.com
      - chefsteps.com
      - modernistcuisine.com
      - sciencedirect.com
      - tandfonline.com
      - pubmed.ncbi.nlm.nih.gov
      - ifst.org                     # Institute of Food Science & Technology
      - ift.org                      # Institute of Food Technologists
      - food52.com
      - cookingissues.com            # Dave Arnold / Booker & Dax
      - chefsteps.com

